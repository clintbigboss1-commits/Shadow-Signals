<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Blackbox AI Coding Agent</title>
  <meta name="description" content="A professional AI coding agent UI with chat, tool calls, file explorer, and diff-based edits." />

  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#0e1630;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --stroke: rgba(255,255,255,.12);
      --stroke2: rgba(255,255,255,.18);
      --text:#eaf0ff;
      --muted: rgba(234,240,255,.72);
      --muted2: rgba(234,240,255,.55);
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --shadow2: 0 10px 30px rgba(0,0,0,.35);
      --brand1:#7c3aed;
      --brand2:#22d3ee;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --radius-xs: 8px;
      --ring: 0 0 0 3px rgba(124,58,237,.22);
      --ring2: 0 0 0 3px rgba(34,211,238,.18);
    }

    /* Light mode */
    @media (prefers-color-scheme: light) {
      :root{
        --bg0:#f6f7ff;
        --bg1:#eef2ff;
        --card: rgba(17,24,39,.06);
        --card2: rgba(17,24,39,.09);
        --stroke: rgba(17,24,39,.14);
        --stroke2: rgba(17,24,39,.20);
        --text:#0b1220;
        --muted: rgba(11,18,32,.70);
        --muted2: rgba(11,18,32,.55);
        --shadow: 0 18px 60px rgba(17,24,39,.14);
        --shadow2: 0 10px 30px rgba(17,24,39,.10);
      }
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(900px 600px at 20% -10%, rgba(124,58,237,.35), transparent 60%),
        radial-gradient(800px 500px at 90% 0%, rgba(34,211,238,.28), transparent 55%),
        radial-gradient(700px 520px at 60% 110%, rgba(16,185,129,.18), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow:hidden;
    }

    /* Layout */
    .app{
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      flex:0 0 auto;
      padding:16px 18px;
      display:flex;
      align-items:center;
      gap:14px;
      border-bottom:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 260px;
    }

    .logo{
      width:40px;height:40px;border-radius:14px;
      background:
        radial-gradient(12px 12px at 30% 30%, rgba(255,255,255,.95), rgba(255,255,255,0)),
        linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,211,238,.9));
      box-shadow: 0 12px 30px rgba(124,58,237,.25), 0 10px 24px rgba(34,211,238,.16);
      position:relative;
      overflow:hidden;
    }
    .logo::after{
      content:"";
      position:absolute; inset:-20px;
      background: conic-gradient(from 180deg, rgba(255,255,255,.0), rgba(255,255,255,.35), rgba(255,255,255,.0));
      transform: rotate(20deg);
      animation: sheen 4.6s linear infinite;
    }
    @keyframes sheen{
      0%{ transform: translateX(-40%) rotate(20deg); opacity:.0;}
      20%{ opacity:.9;}
      50%{ opacity:.35;}
      100%{ transform: translateX(40%) rotate(20deg); opacity:.0;}
    }

    .brand h1{
      font-size:14px;
      margin:0;
      font-weight:780;
      letter-spacing:.2px;
      line-height:1.2;
    }
    .brand p{
      margin:0;
      font-size:12px;
      color: var(--muted);
      line-height:1.2;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      margin-left:auto;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      display:flex;
      gap:8px;
      align-items:center;
      padding:9px 12px;
      border:1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      user-select:none;
    }
    .pill .dot{
      width:10px;height:10px;border-radius:50%;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      box-shadow: 0 0 0 4px rgba(124,58,237,.18);
    }
    .pill .k{
      font-size:12px;
      color: var(--muted);
    }
    .pill .v{
      font-size:12px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .btn{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding:10px 12px;
      border-radius: 12px;
      cursor:pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-weight:650;
      letter-spacing:.2px;
      user-select:none;
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: var(--stroke2);
      background: rgba(255,255,255,.06);
    }
    .btn:active{ transform: translateY(0px); }
    .btn:focus{ outline:none; box-shadow: var(--ring); }

    .btn.primary{
      border-color: rgba(124,58,237,.55);
      background: linear-gradient(135deg, rgba(124,58,237,.92), rgba(34,211,238,.75));
      box-shadow: 0 16px 40px rgba(124,58,237,.18), 0 10px 26px rgba(34,211,238,.14);
    }
    .btn.primary:focus{ box-shadow: var(--ring2); }
    .btn.danger{
      border-color: rgba(251,113,133,.45);
      background: rgba(251,113,133,.12);
    }

    .kbd{
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      border:1px solid var(--stroke);
      padding:4px 7px;
      border-radius: 10px;
      background: rgba(255,255,255,.03);
    }

    /* Main */
    .main{
      flex:1 1 auto;
      display:grid;
      grid-template-columns: 320px minmax(420px, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      min-height:0;
    }

    @media (max-width: 1220px){
      body{ overflow:auto; }
      .main{
        grid-template-columns: 320px 1fr;
        grid-template-rows: auto auto;
      }
      .rightPanel{ grid-column: 1 / -1; }
    }
    @media (max-width: 860px){
      .main{
        grid-template-columns: 1fr;
      }
      .leftPanel, .centerPanel, .rightPanel{ grid-column: 1 / -1; }
      body{ overflow:auto; }
    }

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow2);
      min-height:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .panelHeader{
      padding:14px 14px 10px;
      display:flex;
      align-items:center;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }
    .panelHeader h2{
      font-size: 13px;
      margin:0;
      font-weight: 800;
      letter-spacing: .25px;
    }
    .panelHeader .sub{
      font-size: 12px;
      color: var(--muted);
      margin-left:auto;
      font-weight:600;
    }

    .leftBody{
      padding: 12px 12px 14px;
      min-height:0;
      overflow:auto;
    }

    .section{
      margin-bottom: 14px;
      padding: 10px;
      border-radius: var(--radius-lg);
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }
    .sectionTitle{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom: 8px;
    }
    .badge{
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      color: var(--muted);
    }

    .searchRow{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .input{
      width:100%;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 10px 12px;
      outline:none;
      transition: box-shadow .12s ease, border-color .12s ease;
      font-weight: 600;
      letter-spacing:.2px;
    }
    .input::placeholder{ color: var(--muted2); font-weight:600; }
    .input:focus{
      box-shadow: var(--ring);
      border-color: rgba(124,58,237,.45);
    }

    .list{
      margin-top: 10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .fileItem{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 10px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select:none;
    }
    .fileItem:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.04);
    }
    .fileIcon{
      width:34px;height:34px;border-radius: 12px;
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      font-family: var(--mono);
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }
    .fileMeta{ min-width:0; }
    .filePath{
      font-weight: 760;
      font-size: 12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.15px;
    }
    .fileDesc{
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Center */
    .centerPanel{
      min-height:0;
    }
    .chatBody{
      padding: 12px;
      min-height:0;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .chatEmpty{
      padding: 18px;
      border-radius: 18px;
      border:1px dashed rgba(255,255,255,.18);
      color: var(--muted);
      background: rgba(255,255,255,.02);
      margin-top: 20px;
    }

    .msgRow{
      display:flex;
      gap: 12px;
      align-items:flex-start;
    }
    .avatar{
      width: 36px;
      height: 36px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      font-weight: 900;
      letter-spacing:.4px;
      color: var(--muted);
      flex: 0 0 auto;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .avatar.ai{
      background: linear-gradient(135deg, rgba(124,58,237,.35), rgba(34,211,238,.20));
      border-color: rgba(124,58,237,.45);
      color: rgba(234,240,255,.9);
    }
    .bubble{
      flex:1 1 auto;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding: 12px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      min-width:0;
    }

    .bubbleHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 8px;
    }
    .who{
      font-weight: 900;
      font-size: 12px;
      letter-spacing:.25px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .who .tag{
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-weight: 800;
    }
    .time{
      color: var(--muted2);
      font-size: 11px;
      font-family: var(--mono);
      flex: 0 0 auto;
    }

    .bubbleText{
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubbleText code{
      font-family: var(--mono);
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 10px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
    }

    .bubbleText .blockCode{
      margin-top: 10px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      overflow:auto;
    }
    .bubbleText pre{
      margin:0;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(234,240,255,.92);
      line-height:1.5;
    }

    .bubbleFooter{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top: 10px;
      flex-wrap:wrap;
    }

    .chip{
      font-size: 11px;
      font-family: var(--mono);
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      padding: 5px 8px;
      border-radius: 999px;
      font-weight: 800;
    }

    .composer{
      padding: 12px;
      border-top: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.04));
    }

    .composerGrid{
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items:end;
    }

    .textarea{
      width:100%;
      border-radius: 16px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 12px 12px;
      outline:none;
      transition: box-shadow .12s ease, border-color .12s ease;
      font-weight: 650;
      letter-spacing:.2px;
      min-height: 86px;
      resize: vertical;
      max-height: 220px;
      line-height: 1.45;
    }
    .textarea::placeholder{ color: var(--muted2); font-weight:650; }
    .textarea:focus{
      box-shadow: var(--ring);
      border-color: rgba(124,58,237,.45);
    }

    .composerActions{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:stretch;
    }

    .smallRow{
      display:flex;
      justify-content:space-between;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    /* Right */
    .rightPanel{
      min-height:0;
    }

    .diffBody{
      padding: 12px;
      min-height:0;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .callouts{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }

    .stat{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      padding: 10px;
      min-width:0;
    }
    .stat .label{
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .stat .value{
      font-weight: 930;
      font-size: 13px;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .spark{
      width:10px;height:10px;border-radius: 4px;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      box-shadow: 0 0 0 4px rgba(124,58,237,.16);
      flex:0 0 auto;
    }

    .diffCard{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      overflow:hidden;
    }

    .diffHeader{
      padding: 10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
    }
    .diffHeader .left{
      display:flex; align-items:center; gap:10px; min-width:0;
    }
    .diffHeader .file{
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .statusPill{
      font-size: 11px;
      font-weight: 900;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      flex:0 0 auto;
    }

    .codeDiff{
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      margin:0;
      padding: 12px;
      white-space: pre;
      overflow:auto;
      color: rgba(234,240,255,.92);
    }

    .codeDiff .add{ color: rgba(52,211,153,.95); }
    .codeDiff .del{ color: rgba(251,113,133,.95); }
    .codeDiff .ctx{ color: rgba(234,240,255,.75); }
    .codeDiff .hunk{ color: rgba(234,240,255,.92); font-weight: 900; }

    .toolLog{
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      overflow:hidden;
    }
    .toolLogHeader{
      padding: 10px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(255,255,255,.02);
    }
    .toolLogHeader .title{
      font-weight: 900;
      font-size: 12px;
      letter-spacing:.2px;
    }
    .toolLogBody{
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(234,240,255,.86);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
    }

    /* Footer hint */
    .footerHint{
      padding: 8px 12px;
      color: var(--muted2);
      font-size: 11px;
      font-weight: 700;
      border-top: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.015);
    }

    /* Spinner */
    .spinner{
      width:16px;height:16px;border-radius:50%;
      border:2px solid rgba(255,255,255,.35);
      border-top-color: rgba(255,255,255,.92);
      animation: spin .9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }
  </style>
</head>

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <h1>Blackbox AI Coding Agent</h1>
        <p>Plan → Tool calls → Diff → Apply</p>
      </div>
    </div>

    <div class="top-actions">
      <div class="pill" title="Session state">
        <span class="dot" aria-hidden="true"></span>
        <span class="k">Session</span>
        <span class="v" id="sessionState">Ready</span>
      </div>

      <button class="btn" id="btnExample" type="button" title="Load an example prompt">
        <span aria-hidden="true">✨</span> Example
      </button>

      <button class="btn danger" id="btnClear" type="button" title="Clear chat">
        <span aria-hidden="true">🧹</span> Clear
      </button>

      <button class="btn primary
